name: Task 4 - Use Self Hosted Runner

on:
  workflow_dispatch:

jobs:
  self-hosted-job:
    name: Run on My Self Hosted Runner
    runs-on: self-hosted

    steps:
      - name: Print hostname
        run: hostname

      - name: Print working directory
        run: pwd

      - name: Create proof file
        run: echo "Created by GitHub Actions on self-hosted runner" > /home/azureuser/self-hosted-proof.txt

      - name: Verify file exists
        run: ls -l /home/azureuser/self-hosted-proof.txt
