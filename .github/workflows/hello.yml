name: Artifact Demo

on:
  workflow_dispatch:
  push:

jobs:
  create-and-upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Generate a file
        run: |
          echo "This is a test artifact file" > artifact-demo.txt
          echo "Created during GitHub Actions workflow" >> artifact-demo.txt
          echo "Run time: $(date)" >> artifact-demo.txt

      - name: Display file content
        run: |
          cat artifact-demo.txt

      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifact
          path: artifact-demo.txt
