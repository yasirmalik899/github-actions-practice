name: Task 1 - GitHub Hosted Runners

on:
  workflow_dispatch:

jobs:
  ubuntu-job:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Print OS name
        run: echo "OS Name: $RUNNER_OS"

      - name: Print hostname
        run: hostname

      - name: Print current user
        run: whoami

  windows-job:
    name: Run on Windows
    runs-on: windows-latest
    steps:
      - name: Print OS name
        run: echo "OS Name: $env:RUNNER_OS"
        shell: pwsh

      - name: Print hostname
        run: hostname
        shell: pwsh

      - name: Print current user
        run: whoami
        shell: pwsh

  macos-job:
    name: Run on macOS
    runs-on: macos-latest
    steps:
      - name: Print OS name
        run: echo "OS Name: $RUNNER_OS"

      - name: Print hostname
        run: hostname

      - name: Print current user
        run: whoami
