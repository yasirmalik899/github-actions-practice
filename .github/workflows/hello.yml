name: Artifact Between Jobs

on:
  workflow_dispatch:

jobs:
  generate-file:
    runs-on: [self-hosted, Linux, X64, Devops]
    steps:
      - name: Generate a file
        run: |
          echo "This file was created in Job 1" > shared-report.txt
          echo "Time: $(date)" >> shared-report.txt

      - name: Show file in Job 1
        run: |
          cat shared-report.txt

      - name: Upload artifact from Job 1
        uses: actions/upload-artifact@v4
        with:
          name: shared-file
          path: shared-report.txt

  use-file:
    runs-on: ubuntu-latest
    needs: generate-file
    steps:
      - name: Download artifact from Job 1
        uses: actions/download-artifact@v4
        with:
          name: shared-file

      - name: Show downloaded files
        run: |
          ls -l

      - name: Print artifact contents in Job 2
        run: |
          cat shared-report.txt
