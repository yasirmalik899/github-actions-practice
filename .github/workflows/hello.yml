name: Hello Workflow

on:
  push:

jobs:
  date:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Check the date and time
        run: date

      - name: Print branch name
        run: echo "Branch: ${{ github.ref_name }}"

      - name: List files
        run: ls -la

      - name: Print runner OS
        run: echo "Runner OS: $RUNNER_OS"
