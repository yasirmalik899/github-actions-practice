name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.11"
      run_tests:
        required: false
        type: boolean
        default: true

    outputs:
      test_result:
        description: "Final test result"
        value: ${{ jobs.build-test.outputs.test_result }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        id: run-tests
        if: ${{ inputs.run_tests }}
        continue-on-error: true
        run: |
          python app.py &
          sleep 5
          curl -f http://localhost:5000/health

      - name: Set test result
        id: set-result
        run: |
          if [ "${{ inputs.run_tests }}" = "false" ]; then
            echo "test_result=skipped" >> $GITHUB_OUTPUT
          elif [ "${{ steps.run-tests.outcome }}" = "success" ]; then
            echo "test_result=passed" >> $GITHUB_OUTPUT
          else
            echo "test_result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
