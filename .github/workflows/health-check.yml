name: Health Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Run container
        run: docker run -d -p 5000:5000 --name capstone-app ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Wait for app
        run: sleep 5

      - name: Check health endpoint
        run: curl -f http://localhost:5000/health

      - name: Create summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Stop and remove container
        if: always()
        run: |
          docker stop capstone-app || true
          docker rm capstone-app || true
